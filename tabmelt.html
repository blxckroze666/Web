<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Tab Melt — Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0a0505; --surface:#130a0a; --surface2:#1f0f0f;
    --border:#3a1a1a; --accent:#f97316; --accent2:#fbbf24;
    --green:#4ade80; --blue:#60a5fa; --purple:#a855f7;
    --text:#fef3ee; --muted:#8a5a4a;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;}
  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:var(--safe-top);}

  /* HEADER */
  .header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;}
  .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent);}
  .logo span{color:var(--accent2);}
  .sync-pill{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
  .sync-dot.live{background:var(--accent);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* CONNECT SCREEN */
  .connect-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px 24px;text-align:center;}
  .connect-icon{font-size:52px;margin-bottom:16px;}
  .connect-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent);margin-bottom:8px;}
  .connect-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:32px;}
  .code-label{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
  .code-row{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
  .code-digit{width:58px;height:72px;background:var(--surface2);border:2px solid var(--border);border-radius:14px;font-size:32px;font-weight:900;text-align:center;color:var(--accent);outline:none;-webkit-appearance:none;font-family:'Syne',sans-serif;}
  .code-digit:focus{border-color:var(--accent);}
  .connect-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:10px;}
  .connect-btn:active{transform:scale(.97);}
  .connect-err{font-size:12px;color:#f87171;min-height:18px;}

  /* TABS */
  .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  .tab{flex:1;padding:12px 4px;text-align:center;font-size:11px;font-weight:800;letter-spacing:.3px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}

  /* CONTENT */
  .main-content{flex:1;overflow:hidden;position:relative;}
  .view{display:none;height:100%;flex-direction:column;overflow:hidden;}
  .view.active{display:flex;}

  /* TAB LIST */
  .tab-scroll{flex:1;overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch;}
  .tab-scroll::-webkit-scrollbar{display:none;}
  .section-hdr{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:6px 0 10px;display:flex;align-items:center;justify-content:space-between;}
  .section-count{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:2px 8px;font-size:10px;color:var(--accent);}

  .tab-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;position:relative;}
  .tab-card:active{background:var(--surface2);}
  .tab-favicon{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;}
  .tab-favicon img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
  .tab-info{flex:1;min-width:0;}
  .tab-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
  .tab-url{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tab-actions{display:flex;gap:6px;flex-shrink:0;}
  .tab-action-btn{width:32px;height:32px;border:none;border-radius:8px;background:var(--surface2);color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .tab-action-btn:active{transform:scale(.9);}
  .tab-action-btn.close:active{background:#f8717122;color:#f87171;}
  .tab-action-btn.focus:active{background:#4ade8022;color:var(--green);}
  .active-indicator{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:3px 0 0 3px;}

  /* GROUP CARD */
  .group-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;}
  .group-hdr{padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;}
  .group-color{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .group-name{font-size:14px;font-weight:800;flex:1;}
  .group-count{font-size:11px;color:var(--muted);font-weight:700;}
  .group-arrow{font-size:12px;color:var(--muted);transition:transform .2s;}
  .group-arrow.open{transform:rotate(180deg);}
  .group-tabs{display:none;border-top:1px solid var(--border);padding:8px 14px;}
  .group-tabs.open{display:block;}
  .group-tab-item{font-size:12px;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .group-tab-item:last-child{border-bottom:none;}

  /* SESSIONS */
  .session-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;}
  .session-name{font-size:15px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
  .session-meta{font-size:11px;color:var(--muted);margin-bottom:12px;}
  .session-btns{display:flex;gap:8px;}
  .session-btn{flex:1;padding:10px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;text-align:center;transition:all .15s;}
  .session-btn.restore{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;}
  .session-btn.delete{background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
  .session-btn:active{transform:scale(.96);}

  /* ACTION BAR */
  .action-bar{padding:12px 16px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;flex-shrink:0;padding-bottom:calc(12px + var(--safe-bottom));}
  .action-bar-btn{flex:1;padding:12px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;text-align:center;transition:all .15s;}
  .action-bar-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;}
  .action-bar-btn.secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
  .action-bar-btn:active{transform:scale(.96);}

  /* STATS BAR */
  .stats-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  .stat-item{flex:1;text-align:center;padding:10px 6px;border-right:1px solid var(--border);}
  .stat-item:last-child{border-right:none;}
  .stat-num{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent);}
  .stat-lbl{font-size:9px;color:var(--muted);font-weight:700;margin-top:1px;}

  /* EMPTY */
  .empty{text-align:center;padding:40px 20px;color:var(--muted);}
  .empty-icon{font-size:36px;margin-bottom:10px;}
  .empty-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#333;margin-bottom:6px;}

  /* TOAST */
  .toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:16px;right:16px;background:rgba(0,0,0,.9);border:1px solid var(--accent);border-radius:10px;padding:10px 16px;font-size:12px;font-weight:700;color:var(--accent);z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;}
  .toast.show{opacity:1;}

  /* hidden when not connected */
  .main-view{display:none;flex-direction:column;flex:1;overflow:hidden;}
  .main-view.active{display:flex;}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">TAB<span>MELT</span></div>
    <div class="sync-pill" id="syncPill" onclick="showConnect()">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Connect</span>
    </div>
  </div>

  <!-- CONNECT SCREEN -->
  <div class="connect-screen" id="connectScreen">
    <div class="connect-icon">🔥</div>
    <div class="connect-title">Tab Melt</div>
    <div class="connect-sub">Enter the 4-digit code from your Chrome extension to manage your tabs from your phone.</div>
    <div class="code-label">Extension Code</div>
    <div class="code-row">
      <input class="code-digit" id="c1" maxlength="1" type="tel" inputmode="numeric"/>
      <input class="code-digit" id="c2" maxlength="1" type="tel" inputmode="numeric"/>
      <input class="code-digit" id="c3" maxlength="1" type="tel" inputmode="numeric"/>
      <input class="code-digit" id="c4" maxlength="1" type="tel" inputmode="numeric"/>
    </div>
    <button class="connect-btn" id="connectBtn" onclick="connectToExtension()">🔥 Connect to Chrome</button>
    <div class="connect-err" id="connectErr"></div>
  </div>

  <!-- MAIN VIEW (after connect) -->
  <div class="main-view" id="mainView">

    <div class="stats-bar">
      <div class="stat-item"><div class="stat-num" id="openCount">0</div><div class="stat-lbl">OPEN TABS</div></div>
      <div class="stat-item"><div class="stat-num" id="groupCount">0</div><div class="stat-lbl">GROUPS</div></div>
      <div class="stat-item"><div class="stat-num" id="sessionCount">0</div><div class="stat-lbl">SESSIONS</div></div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('tabs')">🗂️ Tabs</div>
      <div class="tab" onclick="switchTab('groups')">📁 Groups</div>
      <div class="tab" onclick="switchTab('sessions')">💾 Sessions</div>
    </div>

    <div class="main-content">

      <!-- TABS VIEW -->
      <div class="view active" id="tabsView">
        <div class="tab-scroll" id="tabsList">
          <div class="empty"><div class="empty-icon">🔥</div><div class="empty-title">Waiting for tabs...</div></div>
        </div>
        <div class="action-bar">
          <button class="action-bar-btn secondary" onclick="closeAllDupes()">🧹 Close Dupes</button>
          <button class="action-bar-btn primary" onclick="saveSession()">💾 Save Session</button>
        </div>
      </div>

      <!-- GROUPS VIEW -->
      <div class="view" id="groupsView">
        <div class="tab-scroll" id="groupsList">
          <div class="empty"><div class="empty-icon">📁</div><div class="empty-title">No groups yet</div></div>
        </div>
        <div class="action-bar">
          <button class="action-bar-btn primary" onclick="autoGroup()">⚡ Auto-Group Tabs</button>
        </div>
      </div>

      <!-- SESSIONS VIEW -->
      <div class="view" id="sessionsView">
        <div class="tab-scroll" id="sessionsList">
          <div class="empty"><div class="empty-icon">💾</div><div class="empty-title">No saved sessions</div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Tab Melt Mobile — connects to Chrome extension via WebSocket
const SERVER = 'https://tubesync-server.onrender.com'; // reuses same relay server
let socket = null;
let isConnected = false;
let roomCode = null;
let tabData = { tabs:[], groups:[], sessions:[] };

// Auto-fill from URL
const urlCode = new URLSearchParams(window.location.search).get('code');
if (urlCode && /^\d{4}$/.test(urlCode)) {
  ['c1','c2','c3','c4'].forEach((id,i) => document.getElementById(id).value = urlCode[i]);
  setTimeout(connectToExtension, 400);
}

// Digit flow
['c1','c2','c3','c4'].forEach((id,i) => {
  const el = document.getElementById(id);
  el.addEventListener('input', e => {
    const v = e.target.value.replace(/\D/g,'');
    e.target.value = v.slice(-1);
    if (v && i<3) document.getElementById(['c1','c2','c3','c4'][i+1]).focus();
  });
  el.addEventListener('keydown', e => {
    if (e.key==='Backspace'&&!el.value&&i>0) document.getElementById(['c1','c2','c3','c4'][i-1]).focus();
    if (e.key==='Enter') connectToExtension();
  });
});

function connectToExtension() {
  const code = ['c1','c2','c3','c4'].map(id=>document.getElementById(id).value).join('');
  if (code.length!==4||!/^\d{4}$/.test(code)) { document.getElementById('connectErr').textContent='Enter all 4 digits'; return; }
  document.getElementById('connectBtn').disabled = true;
  document.getElementById('connectErr').textContent = '';

  const io_script = document.createElement('script');
  io_script.src = 'https://cdn.socket.io/4.7.2/socket.io.min.js';
  io_script.onload = () => initSocket(code);
  document.head.appendChild(io_script);
}

function initSocket(code) {
  socket = io(SERVER, { transports:['websocket','polling'], reconnection:true, reconnectionAttempts:10 });
  socket.on('connect', () => socket.emit('join-room', { code, role:'tabmelt-mobile' }));
  socket.on('join-success', () => {
    roomCode = code;
    isConnected = true;
    window.history.replaceState({},''`?code=${code}`);
    showMainView();
    socket.emit('tm-request-tabs');
  });
  socket.on('join-error', ({ message }) => {
    document.getElementById('connectErr').textContent = message;
    document.getElementById('connectBtn').disabled = false;
  });
  socket.on('tm-tab-data', (data) => {
    tabData = data;
    renderAll();
  });
  socket.on('tm-tab-closed', ({ tabId }) => {
    tabData.tabs = tabData.tabs.filter(t=>t.id!==tabId);
    renderAll();
    showToast('Tab closed');
  });
  socket.on('tm-session-saved', ({ session }) => {
    tabData.sessions.unshift(session);
    renderSessions();
    showToast('Session saved!');
  });
  socket.on('disconnect', () => {
    isConnected = false;
    document.getElementById('syncDot').classList.remove('live');
    document.getElementById('syncText').textContent = 'Reconnecting...';
  });
  socket.on('connect', () => {
    if (roomCode) {
      socket.emit('join-room', { code:roomCode, role:'tabmelt-mobile' });
      document.getElementById('syncDot').classList.add('live');
      document.getElementById('syncText').textContent = 'Connected';
    }
  });
}

function showMainView() {
  document.getElementById('connectScreen').style.display = 'none';
  document.getElementById('mainView').classList.add('active');
  document.getElementById('syncDot').classList.add('live');
  document.getElementById('syncText').textContent = 'Live';

  // Demo data for Tab Melt (before extension is built)
  tabData = {
    tabs: [
      { id:1, title:'YouTube — Soccer Highlights', url:'https://youtube.com/watch', favIconUrl:'', active:true },
      { id:2, title:'Gmail — Inbox', url:'https://mail.google.com', favIconUrl:'', active:false },
      { id:3, title:'Twitter/X — Home', url:'https://x.com', favIconUrl:'', active:false },
      { id:4, title:'GitHub — blxckroze666', url:'https://github.com/blxckroze666', favIconUrl:'', active:false },
      { id:5, title:'Claude — New Conversation', url:'https://claude.ai', favIconUrl:'', active:false },
      { id:6, title:'Chrome Extension Dev Docs', url:'https://developer.chrome.com', favIconUrl:'', active:false },
    ],
    groups: [
      { id:1, name:'Work', color:'#60a5fa', tabs:[2,4,6] },
      { id:2, name:'Social', color:'#a855f7', tabs:[3] },
      { id:3, name:'Entertainment', color:'#f97316', tabs:[1] },
    ],
    sessions: [
      { id:1, name:'Morning Session', tabCount:8, savedAt:'Today 9:14am' },
      { id:2, name:'Research — Extensions', tabCount:12, savedAt:'Yesterday 3:22pm' },
    ]
  };
  renderAll();
}

function renderAll() {
  renderTabs(); renderGroups(); renderSessions();
  document.getElementById('openCount').textContent = tabData.tabs.length;
  document.getElementById('groupCount').textContent = tabData.groups.length;
  document.getElementById('sessionCount').textContent = tabData.sessions.length;
}

function renderTabs() {
  const el = document.getElementById('tabsList');
  if (!tabData.tabs.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🔥</div><div class="empty-title">No open tabs</div></div>'; return; }
  el.innerHTML = `<div class="section-hdr">OPEN TABS <span class="section-count">${tabData.tabs.length}</span></div>` +
    tabData.tabs.map(tab => `
      <div class="tab-card">
        ${tab.active?'<div class="active-indicator"></div>':''}
        <div class="tab-favicon">${getDomainIcon(tab.url)}</div>
        <div class="tab-info">
          <div class="tab-title">${tab.title||'Untitled'}</div>
          <div class="tab-url">${getDomain(tab.url)}</div>
        </div>
        <div class="tab-actions">
          <button class="tab-action-btn focus" onclick="focusTab(${tab.id})" title="Focus">👁️</button>
          <button class="tab-action-btn close" onclick="closeTab(${tab.id})" title="Close">✕</button>
        </div>
      </div>`).join('');
}

function renderGroups() {
  const el = document.getElementById('groupsList');
  if (!tabData.groups.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📁</div><div class="empty-title">No groups yet</div><div style="font-size:12px;color:var(--muted);margin-top:6px">Tap Auto-Group to organize your tabs</div></div>'; return; }
  el.innerHTML = tabData.groups.map(g => {
    const groupTabs = tabData.tabs.filter(t=>g.tabs.includes(t.id));
    return `<div class="group-card">
      <div class="group-hdr" onclick="toggleGroup(${g.id})">
        <div class="group-color" style="background:${g.color}"></div>
        <div class="group-name">${g.name}</div>
        <div class="group-count">${groupTabs.length} tabs</div>
        <div class="group-arrow" id="garrow-${g.id}">▼</div>
      </div>
      <div class="group-tabs" id="gtabs-${g.id}">
        ${groupTabs.map(t=>`<div class="group-tab-item"><span>${getDomainIcon(t.url)}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title||getDomain(t.url)}</span><button onclick="closeTab(${t.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;">✕</button></div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderSessions() {
  const el = document.getElementById('sessionsList');
  if (!tabData.sessions.length) { el.innerHTML='<div class="empty"><div class="empty-icon">💾</div><div class="empty-title">No saved sessions</div><div style="font-size:12px;color:var(--muted);margin-top:6px">Save your current tabs as a session</div></div>'; return; }
  el.innerHTML = tabData.sessions.map(s=>`
    <div class="session-card">
      <div class="session-name">💾 ${s.name}</div>
      <div class="session-meta">${s.tabCount} tabs · Saved ${s.savedAt}</div>
      <div class="session-btns">
        <button class="session-btn restore" onclick="restoreSession(${s.id})">↩️ Restore</button>
        <button class="session-btn delete" onclick="deleteSession(${s.id})">🗑️ Delete</button>
      </div>
    </div>`).join('');
}

function toggleGroup(id) {
  const tabs = document.getElementById(`gtabs-${id}`);
  const arrow = document.getElementById(`garrow-${id}`);
  tabs.classList.toggle('open');
  arrow.classList.toggle('open');
}

function closeTab(tabId) {
  if (socket&&isConnected) socket.emit('tm-close-tab', { tabId });
  tabData.tabs = tabData.tabs.filter(t=>t.id!==tabId);
  tabData.groups = tabData.groups.map(g=>({...g, tabs:g.tabs.filter(id=>id!==tabId)}));
  renderAll();
  showToast('Tab closed');
  if (navigator.vibrate) navigator.vibrate(30);
}

function focusTab(tabId) {
  if (socket&&isConnected) socket.emit('tm-focus-tab', { tabId });
  showToast('Switching to tab...');
}

function closeAllDupes() {
  const seen = new Set();
  const dupes = [];
  tabData.tabs.forEach(t => {
    const domain = getDomain(t.url);
    if (seen.has(domain)) dupes.push(t.id);
    else seen.add(domain);
  });
  dupes.forEach(id => closeTab(id));
  showToast(`Closed ${dupes.length} duplicate${dupes.length!==1?'s':''}`);
}

function saveSession() {
  const name = `Session — ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
  if (socket&&isConnected) {
    socket.emit('tm-save-session', { name });
  } else {
    const session = { id: Date.now(), name, tabCount: tabData.tabs.length, savedAt: 'Just now' };
    tabData.sessions.unshift(session);
    renderSessions();
    document.getElementById('sessionCount').textContent = tabData.sessions.length;
  }
  showToast('Session saved!');
  if (navigator.vibrate) navigator.vibrate([50,30,50]);
}

function autoGroup() {
  const domainGroups = {};
  tabData.tabs.forEach(t => {
    const domain = getDomain(t.url);
    if (!domainGroups[domain]) domainGroups[domain] = [];
    domainGroups[domain].push(t.id);
  });
  const colors = ['#60a5fa','#a855f7','#f97316','#4ade80','#fbbf24','#22d3ee'];
  tabData.groups = Object.entries(domainGroups).filter(([,ids])=>ids.length>0).map(([domain,ids],i)=>({ id:i+1, name:domain.replace('www.',''), color:colors[i%colors.length], tabs:ids }));
  if (socket&&isConnected) socket.emit('tm-auto-group');
  renderGroups();
  document.getElementById('groupCount').textContent = tabData.groups.length;
  showToast(`Created ${tabData.groups.length} groups`);
}

function restoreSession(id) {
  if (socket&&isConnected) socket.emit('tm-restore-session', { sessionId:id });
  showToast('Restoring session in Chrome...');
}

function deleteSession(id) {
  tabData.sessions = tabData.sessions.filter(s=>s.id!==id);
  renderSessions();
  document.getElementById('sessionCount').textContent = tabData.sessions.length;
  showToast('Session deleted');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['tabs','groups','sessions'][i]===tab));
  document.getElementById('tabsView').classList.toggle('active',tab==='tabs');
  document.getElementById('groupsView').classList.toggle('active',tab==='groups');
  document.getElementById('sessionsView').classList.toggle('active',tab==='sessions');
}

function showConnect() {
  if (!isConnected) {
    document.getElementById('mainView').classList.remove('active');
    document.getElementById('connectScreen').style.display = 'flex';
  }
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch(e) { return url; }
}

function getDomainIcon(url) {
  const domain = getDomain(url);
  const icons = { 'youtube.com':'▶️', 'gmail.com':'📧', 'mail.google.com':'📧', 'github.com':'💻', 'claude.ai':'🤖', 'x.com':'🐦', 'twitter.com':'🐦', 'google.com':'🔍', 'developer.chrome.com':'⚙️', 'reddit.com':'📰', 'notion.so':'📝' };
  for (const [k,v] of Object.entries(icons)) { if (domain.includes(k)) return v; }
  return '🌐';
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
