<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#060a06"/>
<title>TradeSync Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#060a06; --surface:#0d120d; --surface2:#141e14;
    --border:#1a2e1a; --green:#00ff88; --red:#ff4444;
    --gold:#ffd700; --blue:#00aaff; --text:#e0ffe0; --muted:#4a6a4a;
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;}
  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:var(--safe-top);}

  .header{padding:12px 18px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--green);}
  .logo span{color:var(--gold);}
  .mode-pill{font-size:9px;font-weight:700;padding:4px 10px;border-radius:10px;letter-spacing:1px;}
  .mode-pill.paper{background:#1a2a1a;color:var(--green);border:1px solid #00ff8844;}
  .mode-pill.live{background:#2a0a0a;color:var(--red);border:1px solid #ff444444;}
  .conn-pill{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--muted);}
  .conn-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
  .conn-dot.live{background:var(--green);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* CONNECT */
  .connect-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px 24px;text-align:center;}
  .connect-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--green);margin-bottom:4px;}
  .connect-logo span{color:var(--gold);}
  .connect-sub{font-size:11px;color:var(--muted);margin-bottom:36px;line-height:1.6;}
  .code-row{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
  .code-digit{width:58px;height:70px;background:var(--surface2);border:2px solid var(--border);border-radius:12px;font-size:30px;font-weight:900;text-align:center;color:var(--green);outline:none;-webkit-appearance:none;font-family:'Syne',sans-serif;}
  .code-digit:focus{border-color:var(--green);}
  .connect-btn{width:100%;padding:15px;border:none;border-radius:12px;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:1px;}
  .connect-btn:active{transform:scale(.97);}
  .connect-err{font-size:11px;color:var(--red);min-height:18px;margin-top:8px;}

  /* TABS */
  .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
  .tab{flex:1;padding:11px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px;}
  .tab.active{color:var(--green);border-bottom-color:var(--green);}

  /* CONTENT */
  .content{flex:1;overflow:hidden;}
  .view{display:none;height:100%;flex-direction:column;overflow:hidden;}
  .view.active{display:flex;}
  .scroll{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{display:none;}

  /* ACCOUNT */
  .acct-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .acct-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
  .acct-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--green);}
  .acct-val.red{color:var(--red);}
  .acct-val.gold{color:var(--gold);}
  .acct-lbl{font-size:8px;color:var(--muted);margin-top:3px;letter-spacing:1px;}

  /* SIGNAL CARDS */
  .sec-label{font-size:9px;color:var(--muted);letter-spacing:2px;padding:4px 0 10px;text-transform:uppercase;}
  .signal-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
  .signal-card.buy{border-left:4px solid var(--green);}
  .signal-card.sell{border-left:4px solid var(--red);}
  .sig-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .sig-sym{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
  .sig-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:8px;letter-spacing:1px;}
  .sig-badge.BUY{background:#00ff8822;color:var(--green);border:1px solid #00ff8844;}
  .sig-badge.SELL{background:#ff444422;color:var(--red);border:1px solid #ff444444;}
  .sig-price{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--gold);margin-bottom:6px;}
  .sig-stats{display:flex;gap:10px;font-size:10px;color:var(--muted);margin-bottom:6px;flex-wrap:wrap;}
  .sig-signals{font-size:10px;color:var(--muted);margin-bottom:12px;line-height:1.7;}
  .sig-confidence{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:1px;margin-bottom:10px;}
  .sig-confidence.HIGH{background:#00ff8815;color:var(--green);border:1px solid #00ff8830;}
  .sig-confidence.MEDIUM{background:#ffd70015;color:var(--gold);border:1px solid #ffd70030;}
  .sig-confidence.LOW{background:#2a2a2a;color:var(--muted);}
  .action-btns{display:flex;gap:10px;}
  .action-btn{flex:1;padding:14px;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:1px;transition:all .15s;}
  .action-btn:active{transform:scale(.95);}
  .action-btn.approve{background:var(--green);color:#000;}
  .action-btn.reject{background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
  .sig-status{font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;letter-spacing:1px;display:inline-block;}
  .sig-status.APPROVED{background:#00ff8815;color:var(--green);}
  .sig-status.REJECTED{background:#ff444415;color:var(--red);}

  /* POSITIONS */
  .pos-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
  .pos-sym{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;width:55px;}
  .pos-info{flex:1;}
  .pos-detail{font-size:11px;color:var(--muted);}
  .pos-pl{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
  .pos-pl.pos{color:var(--green);}
  .pos-pl.neg{color:var(--red);}

  /* EMPTY */
  .empty{text-align:center;padding:40px 20px;color:var(--muted);}
  .empty-icon{font-size:36px;margin-bottom:10px;}
  .empty-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#1a2a1a;margin-bottom:6px;}

  /* TOAST */
  .toast{position:fixed;bottom:calc(20px + var(--safe-bottom));left:16px;right:16px;background:var(--surface);border:1px solid var(--green);border-radius:10px;padding:10px 16px;font-size:11px;font-weight:700;color:var(--green);text-align:center;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">TRADE<span>SYNC</span></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="mode-pill paper" id="modePill">🧪 PAPER</div>
      <div class="conn-pill"><div class="conn-dot" id="connDot"></div><span id="connText">Connect</span></div>
    </div>
  </div>

  <!-- CONNECT SCREEN -->
  <div class="connect-screen" id="connectScreen">
    <div class="connect-logo">TRADE<span>SYNC</span></div>
    <div class="connect-sub">Enter the 4-digit code from your<br>TradeSync Chrome extension</div>
    <div class="code-row">
      <input class="code-digit" id="d1" maxlength="1" type="tel" inputmode="numeric"/>
      <input class="code-digit" id="d2" maxlength="1" type="tel" inputmode="numeric"/>
      <input class="code-digit" id="d3" maxlength="1" type="tel" inputmode="numeric"/>
      <input class="code-digit" id="d4" maxlength="1" type="tel" inputmode="numeric"/>
    </div>
    <button class="connect-btn" id="connectBtn" onclick="connect()">📊 CONNECT</button>
    <div class="connect-err" id="connectErr"></div>
  </div>

  <!-- MAIN -->
  <div id="mainView" style="display:none;flex:1;flex-direction:column;overflow:hidden;display:none;">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('signals')">📊 SIGNALS</div>
      <div class="tab" onclick="switchTab('portfolio')">💼 PORTFOLIO</div>
      <div class="tab" onclick="switchTab('account')">💰 ACCOUNT</div>
    </div>
    <div class="content">
      <!-- SIGNALS -->
      <div class="view active" id="signalsView">
        <div class="scroll">
          <div class="sec-label">PENDING APPROVAL</div>
          <div id="signalsList"></div>
        </div>
      </div>
      <!-- PORTFOLIO -->
      <div class="view" id="portfolioView">
        <div class="scroll">
          <div class="sec-label">OPEN POSITIONS</div>
          <div id="positionsList"></div>
        </div>
      </div>
      <!-- ACCOUNT -->
      <div class="view" id="accountView">
        <div class="scroll">
          <div class="acct-grid" id="acctGrid">
            <div class="acct-card"><div class="acct-val" id="mEquity">--</div><div class="acct-lbl">EQUITY</div></div>
            <div class="acct-card"><div class="acct-val gold" id="mBP">--</div><div class="acct-lbl">BUYING POWER</div></div>
            <div class="acct-card"><div class="acct-val" id="mPL">--</div><div class="acct-lbl">DAY P&L</div></div>
            <div class="acct-card"><div class="acct-val" id="mPositions">--</div><div class="acct-lbl">POSITIONS</div></div>
          </div>
          <div class="sec-label">RECENT ORDERS</div>
          <div id="ordersList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const SERVER = 'https://tubesync-server.onrender.com';
let socket = null;
let isConnected = false;
let roomCode = null;
let appData = { signals:[], portfolio:{}, account:{} };

// Auto-fill code from URL
const urlCode = new URLSearchParams(window.location.search).get('code');
if (urlCode && /^\d{4}$/.test(urlCode)) {
  ['d1','d2','d3','d4'].forEach((id,i) => document.getElementById(id).value = urlCode[i]);
  setTimeout(connect, 400);
}

// Digit flow
['d1','d2','d3','d4'].forEach((id,i) => {
  const el = document.getElementById(id);
  el.addEventListener('input', e => {
    const v = e.target.value.replace(/\D/g,'');
    e.target.value = v.slice(-1);
    if (v && i < 3) document.getElementById(['d1','d2','d3','d4'][i+1]).focus();
  });
  el.addEventListener('keydown', e => {
    if (e.key==='Backspace' && !el.value && i > 0) document.getElementById(['d1','d2','d3','d4'][i-1]).focus();
    if (e.key==='Enter') connect();
  });
});

function connect() {
  const code = ['d1','d2','d3','d4'].map(id => document.getElementById(id).value).join('');
  if (code.length !== 4) { document.getElementById('connectErr').textContent = 'Enter all 4 digits'; return; }
  document.getElementById('connectBtn').disabled = true;

  socket = io(SERVER, { transports:['websocket','polling'], reconnection:true, reconnectionAttempts:10 });

  socket.on('connect', () => socket.emit('join-room', { code }));

  socket.on('join-success', () => {
    roomCode = code;
    isConnected = true;
    window.history.replaceState({}, '', `?code=${code}`);
    showMainView();
    requestData();
  });

  socket.on('join-error', ({ message }) => {
    document.getElementById('connectErr').textContent = message;
    document.getElementById('connectBtn').disabled = false;
  });

  // Receive data from extension
  socket.on('fan-audio-action', ({ action }) => {
    try {
      const msg = JSON.parse(action);
      if (msg.type === 'signals') { appData.signals = msg.data; renderSignals(); }
      if (msg.type === 'portfolio') { appData.portfolio = msg.data; renderPortfolio(); renderAccount(); }
      if (msg.type === 'order_placed') { showToast('✅ Order executed!'); requestData(); }
    } catch(e) {}
  });

  socket.on('disconnect', () => {
    isConnected = false;
    document.getElementById('connDot').classList.remove('live');
    document.getElementById('connText').textContent = 'Reconnecting...';
  });

  socket.on('connect', () => {
    if (roomCode) {
      socket.emit('join-room', { code: roomCode });
      document.getElementById('connDot').classList.add('live');
      document.getElementById('connText').textContent = 'Live';
    }
  });
}

function requestData() {
  if (socket && isConnected) {
    socket.emit('fan-tactical-input', { x:0, y:0, type:'ts-request-data' });
  }
}

function showMainView() {
  document.getElementById('connectScreen').style.display = 'none';
  const mv = document.getElementById('mainView');
  mv.style.display = 'flex';
  mv.style.flexDirection = 'column';
  document.getElementById('connDot').classList.add('live');
  document.getElementById('connText').textContent = 'Live';
}

function switchTab(tab) {
  ['signals','portfolio','account'].forEach(t => {
    document.getElementById(`${t}View`).classList.toggle('active', t === tab);
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['signals','portfolio','account'][i] === tab);
  });
}

function renderSignals() {
  const el = document.getElementById('signalsList');
  const signals = appData.signals || [];
  if (!signals.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📡</div><div class="empty-title">NO SIGNALS YET</div><div style="font-size:11px;color:var(--muted)">Scan for signals on desktop</div></div>';
    return;
  }
  el.innerHTML = signals.map(s => `
    <div class="signal-card ${s.action.toLowerCase()}">
      <div class="sig-top">
        <div class="sig-sym">${s.symbol}</div>
        <div class="sig-badge ${s.action}">${s.action}</div>
      </div>
      <div class="sig-price">$${s.price?.toFixed(2)}</div>
      <div class="sig-stats">
        <span>RSI ${s.rsi}</span>
        <span>Score ${s.score > 0 ? '+' : ''}${s.score}</span>
        <span>${s.momentum}% today</span>
        <span>Vol ${s.volRatio}x avg</span>
      </div>
      <div class="sig-signals">${s.signals?.join(' · ') || ''}</div>
      <div class="sig-confidence ${s.confidence}">${s.confidence} CONFIDENCE</div><br/>
      ${s.status === 'PENDING' ? `
      <div class="action-btns">
        <button class="action-btn approve" onclick="approveSignal('${s.id}')">✅ APPROVE</button>
        <button class="action-btn reject" onclick="rejectSignal('${s.id}')">✕ REJECT</button>
      </div>` : `<div class="sig-status ${s.status}">${s.status}</div>`}
    </div>`).join('');
}

function renderPortfolio() {
  const el = document.getElementById('positionsList');
  const positions = appData.portfolio?.positions || [];
  if (!positions.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">NO POSITIONS</div></div>';
    return;
  }
  el.innerHTML = positions.map(p => {
    const pl = parseFloat(p.unrealized_pl);
    return `<div class="pos-card">
      <div class="pos-sym">${p.symbol}</div>
      <div class="pos-info">
        <div style="font-size:13px;font-weight:700">${p.qty} shares</div>
        <div class="pos-detail">avg $${parseFloat(p.avg_entry_price).toFixed(2)}</div>
      </div>
      <div class="pos-pl ${pl >= 0 ? 'pos' : 'neg'}">${pl >= 0 ? '+' : ''}$${pl.toFixed(2)}</div>
    </div>`;
  }).join('');
}

function renderAccount() {
  const acct = appData.portfolio?.account;
  if (!acct) return;
  const pl = parseFloat(acct.equity) - parseFloat(acct.last_equity);
  document.getElementById('mEquity').textContent = '$' + Math.round(parseFloat(acct.equity)).toLocaleString();
  document.getElementById('mBP').textContent = '$' + Math.round(parseFloat(acct.buying_power)).toLocaleString();
  const plEl = document.getElementById('mPL');
  plEl.textContent = (pl >= 0 ? '+$' : '-$') + Math.abs(pl).toFixed(0);
  plEl.className = 'acct-val ' + (pl >= 0 ? '' : 'red');
  document.getElementById('mPositions').textContent = appData.portfolio?.positions?.length || 0;
  document.getElementById('modePill').textContent = acct.paper_trading ? '🧪 PAPER' : '💰 LIVE';
  document.getElementById('modePill').className = 'mode-pill ' + (acct.paper_trading ? 'paper' : 'live');

  const orders = appData.portfolio?.orders || [];
  document.getElementById('ordersList').innerHTML = orders.length ?
    orders.map(o => `<div class="pos-card"><div class="pos-sym">${o.symbol}</div><div class="pos-info"><div style="font-size:12px">${o.side.toUpperCase()} ${o.qty}</div><div class="pos-detail">${o.status}</div></div></div>`).join('') :
    '<div style="font-size:11px;color:var(--muted);padding:10px 0">No open orders</div>';
}

function approveSignal(signalId) {
  if (!socket || !isConnected) { showToast('Not connected'); return; }
  socket.emit('fan-tactical-input', { x:0, y:0, type: `ts-approve:${signalId}` });
  showToast('✅ Approval sent');
  if (navigator.vibrate) navigator.vibrate([50,30,50]);
  const sig = appData.signals.find(s => s.id === signalId);
  if (sig) { sig.status = 'APPROVED'; renderSignals(); }
}

function rejectSignal(signalId) {
  if (!socket || !isConnected) return;
  socket.emit('fan-tactical-input', { x:0, y:0, type: `ts-reject:${signalId}` });
  showToast('Signal rejected');
  const sig = appData.signals.find(s => s.id === signalId);
  if (sig) { sig.status = 'REJECTED'; renderSignals(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
